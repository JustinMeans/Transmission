name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift: ["6.0"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Run Tests
        run: swift test -v

  test-macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Swift 6
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: swift build -v

      - name: Run Tests
        run: swift test -v
